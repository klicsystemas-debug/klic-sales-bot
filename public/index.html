<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klic Systemas | Demo Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #05162e;
            --orange: #f97316;
            --orange-h: #ea580c;
            --glass: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #05162e);
            color: var(--text); 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* Header Compacto */
        header {
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 35px; }
        .logo-text { font-weight: 700; font-size: 1.2rem; }

        .btn-wa { background: var(--orange); color: white; padding: 0.5rem 1rem; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.8rem; }

        /* Main Layout */
        .app-container {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            padding: 1rem 5%;
            gap: 2rem;
            align-items: center;
        }

        /* Form Column */
        .config-panel {
            max-width: 450px;
            animation: fadeInLeft 0.8s ease-out;
        }
        .config-panel h1 { font-size: 2.2rem; margin-bottom: 0.5rem; line-height: 1; }
        .config-panel p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--orange); margin-bottom: 4px; text-transform: uppercase; }
        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        textarea { resize: none; rows: 2; }
        .btn-run {
            width: 100%;
            background: var(--orange);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-run:hover { background: var(--orange-h); transform: translateY(-2px); }

        /* Phone Column */
        .phone-mockup {
            position: relative;
            width: 290px;
            height: 580px;
            background: #000;
            border: 8px solid #222;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Instagram Header inside phone */
        .ig-hdr {
            background: #000;
            padding: 30px 15px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #1a1a1a;
        }
        .ig-back-icon { font-size: 1.2rem; color: #fff; }
        .ig-p-pic { width: 32px; height: 32px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }
        .ig-u-name { font-weight: 700; font-size: 0.8rem; color: #fff; }

        #chatLog { flex-grow: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #000; scrollbar-width: none; }
        .msg { padding: 8px 12px; border-radius: 18px; font-size: 0.8rem; max-width: 85%; line-height: 1.3; }
        .bot { background: #262626; color: white; align-self: flex-start; }
        .user { background: #3797f0; color: white; align-self: flex-end; }

        .input-area { padding: 10px; background: #000; border-top: 1px solid #1a1a1a; }
        #chatInput { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 8px 15px; color: white; width: 100%; font-size: 0.8rem; outline: none; }

        footer-services { display: flex; gap: 15px; margin-top: 20px; }
        .f-item { font-size: 0.7rem; color: #94a3b8; display: flex; align-items: center; gap: 5px; }

        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 900px) {
            body { overflow-y: auto; height: auto; }
            .app-container { grid-template-columns: 1fr; padding-bottom: 50px; }
            .phone-mockup { margin-top: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="logo.png" class="logo-img" id="mainLogo" onerror="this.src='Logo.png'; this.onerror=function(){this.src='Logo'; this.onerror=null;};">
            <span class="logo-text">KLIC SYSTEMAS</span>
        </div>
        <a href="https://wa.me/549123456789" class="btn-wa">WhatsApp ➔</a>
    </header>

    <main class="app-container">
        
        <div class="config-panel">
            <h1>Expertos en Automatización</h1>
            <p>Convertí tu Instagram en una máquina de ventas 24/7. Ingresá los datos de tu negocio y probá tu nuevo bot el teléfono.</p>
            
            <div class="input-group">
                <label>Nombre del Negocio</label>
                <input type="text" id="bizName" placeholder="Pizzería Mario, Neumáticos Garibaldo...">
            </div>
            
            <div class="input-group">
                <label>¿Qué vendés y en qué tono?</label>
                <textarea id="bizDesc" placeholder="Soy una ferretería. Tono profesional que pida el WhatsApp del cliente." rows="2"></textarea>
            </div>

            <button class="btn-run" id="startBtn">ACTIVAR MI BOT IA ➔</button>

            <div class="footer-services" style="display: flex; gap: 20px; margin-top: 20px; opacity: 0.6;">
                <div class="f-item">🏆 Ventas 24/7</div>
                <div class="f-item">👔 Tono Humano</div>
                <div class="f-item">📱 Lead Gen</div>
            </div>
        </div>

        <div class="phone-mockup">
            <div class="ig-hdr">
                <span class="ig-back-icon">‹</span>
                <div class="ig-p-pic"></div>
                <div class="ig-u-name" id="igTitle">Demo Lab</div>
            </div>
            
            <div id="chatLog">
                <div style="margin-top: 60%; color: #333; text-align: center; font-size: 0.7rem;">Configurá tu bot para iniciar</div>
            </div>

            <div class="input-area">
                <input type="text" id="chatInput" placeholder="Enviar mensaje..." autocomplete="off">
            </div>
        </div>

    </main>

    <script>
        const bizNameInput = document.getElementById('bizName');
        const bizDescInput = document.getElementById('bizDesc');
        const startBtn = document.getElementById('startBtn');
        const chatLog = document.getElementById('chatLog');
        const chatInput = document.getElementById('chatInput');
        const igTitle = document.getElementById('igTitle');

        let demoActive = false;
        let chatHistory = [];

        startBtn.onclick = () => {
            if(!bizNameInput.value) return alert("Poné el nombre de tu negocio");
            demoActive = true;
            chatHistory = [];
            igTitle.innerText = bizNameInput.value;
            chatLog.innerHTML = "";
            addMessage("bot", `¡Hola! ¿Cómo estás? Soy el asistente de ${bizNameInput.value}. ¿En que podemos asesorarte hoy?`);
            startBtn.innerText = "¡BOT ACTIVO! ✓";
            setTimeout(() => startBtn.innerText = "ACTUALIZAR BOT ➔", 2000);
        };

        function addMessage(sender, text, id = null) {
            const div = document.createElement("div");
            div.className = "msg " + sender;
            if(id) div.id = id;
            div.innerText = text;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        chatInput.onkeypress = async (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                const text = chatInput.value.trim();
                if(!text || !demoActive) return;
                chatInput.value = "";
                addMessage("user", text);
                const typingId = "typing_" + Date.now();
                addMessage("bot", "...", typingId);

                try {
                    const response = await fetch('/api/demo-chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            business_name: bizNameInput.value,
                            business_description: bizDescInput.value,
                            user_message: text,
                            chat_history: chatHistory
                        })
                    });
                    const data = await response.json();
                    document.getElementById(typingId).remove();
                    addMessage("bot", data.response);
                    chatHistory.push({ role: "user", content: text });
                    chatHistory.push({ role: "assistant", content: data.response });
                    if(chatHistory.length > 10) chatHistory.shift();
                } catch (err) {
                    document.getElementById(typingId).innerText = "Error";
                }
            }
        };
    </script>
</body>
</html>
