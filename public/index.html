<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klic Systemas | Soluciones de IA para Instagram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #05162e;
            --orange: #f97316;
            --orange-h: #ea580c;
            --white: #ffffff;
            --gray: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; background: var(--navy); color: var(--white); height: 100vh; overflow: hidden;
            background: radial-gradient(circle at top right, #1e1b4b, #05162e);
            display: flex; flex-direction: column;
        }

        header { padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.5rem; }
        .logo img { height: 40px; }

        .btn-wa { background: var(--orange); color: white; padding: 0.7rem 1.4rem; border-radius: 4px; font-weight: 700; text-decoration: none; font-size: 0.9rem; }

        .hero { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 5%; }
        .hero h1 { font-size: 4.5rem; font-weight: 700; line-height: 1; margin-bottom: 1.5rem; }
        .hero p { font-size: 1.3rem; color: var(--gray); max-width: 750px; margin-bottom: 3rem; }

        .cta-box { display: flex; gap: 20px; }
        .btn-lab { background: var(--white); color: var(--navy); padding: 1.2rem 2.5rem; border-radius: 8px; font-weight: 700; font-size: 1.1rem; text-decoration: none; transition: 0.3s; }
        .btn-lab:hover { background: var(--orange); color: white; transform: scale(1.05); }

        .highlights { display: flex; gap: 40px; margin-top: 60px; opacity: 0.5; }
        .h-item { font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }

        @media (max-width: 800px) {
            .hero h1 { font-size: 2.8rem; }
            .hero p { font-size: 1rem; }
            .highlights { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="Logo" onerror="this.src='logo.png'; this.onerror=function(){this.style.display='none'; document.getElementById('logoK').style.display='flex';};">
            <span id="logoK" style="display:none; width:40px; height:40px; background:var(--orange); border-radius:10px; align-items:center; justify-content:center; font-size:1.4rem; font-weight:900; color:white;">K</span>
            <span>KLIC SYSTEMAS</span>
        </div>
        <a href="https://wa.me/549123456789" class="btn-wa">Contactar</a>
    </header>

    <div class="hero">
        <h1>Diseñamos Inteligencia<br>que Cierra Ventas</h1>
        <p>Expertos en automatizaciónConversacional para Instagram. Transformamos tus DMs en un canal de ventas eficiente y humano.</p>
        
        <div class="cta-box">
            <a href="/lab" class="btn-lab">ACCEDER AL LAB ➔</a>
        </div>

        <div class="highlights">
            <div class="h-item">🛡️ Seguro y Privado</div>
            <div class="h-item">📈 Escalable</div>
            <div class="h-item">🤖 IA de Última Generación</div>
        </div>
    </div>

</body>
</html>
