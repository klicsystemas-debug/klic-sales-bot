<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klic Lab | E-commerce Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #05162e;
            --orange: #f97316;
            --orange-h: #ea580c;
            --gray: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #05162e);
            color: white; height: 100vh; overflow: hidden; display: grid; grid-template-columns: 1fr 1.2fr; padding: 2rem 5%; gap: 4rem; align-items: center;
        }

        /* Config Panel */
        .config-card { max-width: 450px; animation: fadeInLeft 0.8s ease-out; }
        .logo-k { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; cursor: pointer; }
        .logo-k img { height: 35px; }

        .config-card h1 { font-size: 2.5rem; margin-bottom: 1rem; color: var(--orange); }
        .config-card p { margin-bottom: 2rem; color: var(--gray); font-size: 0.95rem; }

        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--gray); margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid #1e293b; padding: 12px; color: white; border-radius: 6px; font-size: 0.95rem; }

        .simulation-switch {
            background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px; border: 1px solid var(--orange); display: flex; justify-content: space-between; align-items: center; margin-top: 15px;
        }

        .btn-run { width: 100%; background: var(--orange); color: white; padding: 1.2rem; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; font-size: 1.1rem; margin-top: 1rem; transition: 0.3; }
        .btn-run:hover { background: var(--orange-h); transform: translateY(-2px); }

        /* Smartphone Mockup */
        .phone { width: 310px; height: 620px; background: #000; border: 10px solid #222; border-radius: 45px; display: flex; flex-direction: column; overflow: hidden; margin: 0 auto; position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .ig-h { background: #000; padding: 35px 15px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1a1a1a; }
        .ig-dot { width: 32px; height: 32px; border-radius: 50%; background: var(--orange); }
        .ig-u { font-weight: 700; font-size: 0.85rem; }

        #chatLog { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .msg { padding: 8px 14px; border-radius: 20px; font-size: 0.8rem; max-width: 85%; }
        .bot { background: #262626; align-self: flex-start; }
        .user { background: #3797f0; align-self: flex-end; }

        /* PRODUCT CARD UI */
        .product-card {
            background: #1a1a1a; border-radius: 12px; overflow: hidden; 
            border: 1px solid #333; margin: 10px 0; max-width: 200px;
            animation: popUp 0.4s ease-out;
        }
        .product-img { width: 100%; height: 150px; object-fit: cover; background: #333; }
        .product-info { padding: 10px; }
        .product-title { font-weight: 700; font-size: 0.85rem; margin-bottom: 4px; }
        .product-price { color: var(--orange); font-weight: 600; font-size: 0.75rem; margin-bottom: 8px; }
        .btn-buy { background: var(--orange); color: white; width: 100%; border: none; padding: 8px; border-radius: 4px; font-weight: 600; font-size: 0.7rem; cursor: pointer; }

        .ig-i { padding: 10px; background: #000; border-top: 1px solid #1a1a1a; }
        #chatInput { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 10px 15px; color: white; width: 100%; outline: none; }

        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 900px) { body { grid-template-columns: 1fr; height: auto; overflow: auto; padding-top: 100px; } }
    </style>
</head>
<body>

    <div class="config-card">
        <div class="logo-k" onclick="window.location.href='/'">
            <img src="logo.png" onerror="this.src='Logo.png';">
            <span style="font-weight:700">KLIC SYSTEMAS</span>
        </div>
        <h1>Lab 4.0: E-commerce</h1>
        <p>Configurá tu negocio y activá la simulación de tienda para que la IA venda productos reales.</p>
        
        <div class="input-group">
            <label>1. Nombre del Negocio</label>
            <input type="text" id="bizName" placeholder="Ej: Arte & Diseño">
        </div>
        
        <div class="input-group">
            <label>2. Especialidad</label>
            <textarea id="bizDesc" placeholder="Venta de cuadros de autor." rows="2"></textarea>
        </div>

        <div class="simulation-switch">
            <div>
                <b style="font-size: 0.8rem;">Modo Catálogo (PoC)</b>
                <p style="font-size: 0.6rem; color: var(--gray);">Busca productos en la Tienda</p>
            </div>
            <input type="checkbox" id="storeSync" style="width: 25px; height: 25px; cursor: pointer;">
        </div>

        <button class="btn-run" id="startBtn">CONECTAR MI BOT ➔</button>
    </div>

    <div class="phone">
        <div class="ig-h">
            <div style="font-size: 1.2rem; margin-right: 5px;">‹</div>
            <div class="ig-dot"></div>
            <div class="ig-u" id="igTitle">Klic Lab</div>
        </div>
        <div id="chatLog">
            <div style="margin-top: 60%; color: #333; text-align: center; font-size: 0.7rem;">Configurá para iniciar charla</div>
        </div>
        <div class="ig-i">
            <input type="text" id="chatInput" placeholder="Escribir mensaje..." autocomplete="off">
        </div>
    </div>

    <script>
        const bizNameInput = document.getElementById('bizName');
        const bizDescInput = document.getElementById('bizDesc');
        const storeSync = document.getElementById('storeSync');
        const startBtn = document.getElementById('startBtn');
        const chatLog = document.getElementById('chatLog');
        const chatInput = document.getElementById('chatInput');
        const igTitle = document.getElementById('igTitle');

        let demoActive = false;

        startBtn.onclick = () => {
            if(!bizNameInput.value) return alert("Faltan datos");
            demoActive = true;
            igTitle.innerText = bizNameInput.value;
            chatLog.innerHTML = "";
            addMessage("bot", `¡Hola! Soy de ${bizNameInput.value}. ¿Qué producto buscabas?`);
            startBtn.innerText = "¡BOT ACTIVO! ✓";
        };

        function addMessage(sender, text, product = null) {
            if(text) {
                const div = document.createElement("div");
                div.className = "msg " + sender;
                div.innerText = text;
                chatLog.appendChild(div);
            }
            if(product) {
                const card = document.createElement("div");
                card.className = "product-card bot";
                card.innerHTML = `
                    <img src="${product.img}" class="product-img">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price}</div>
                        <button class="btn-buy">Comprar ahora ➔</button>
                    </div>
                `;
                chatLog.appendChild(card);
            }
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        chatInput.onkeypress = async (e) => {
            if(e.key === 'Enter') {
                const text = chatInput.value.trim();
                if(!text || !demoActive) return;
                chatInput.value = "";
                addMessage("user", text);
                
                const response = await fetch('/api/demo-chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        business_name: bizNameInput.value,
                        business_description: bizDescInput.value,
                        store_mode: storeSync.checked,
                        user_message: text
                    })
                });
                const data = await response.json();
                
                // Si la respuesta del servidor incluye un objeto de producto (simulado)
                if(data.product) {
                    addMessage("bot", data.response, data.product);
                } else {
                    addMessage("bot", data.response);
                }
            }
        };
    </script>
</body>
</html>
